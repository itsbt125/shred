<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shred — expired</title>
<link rel="icon" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="wrap">

  <header class="site">
    <div class="brand">
        <a href="/" class="logo">shred</a>
      <span class="tagline">ephemeral file sharing &middot; <a href="https://github.com/itsbt125/shred">free &amp; open source</a></span>
    </div>
  </header>

  <main>
    <div class="error-panel">
      <div class="error-code">410 &mdash; GONE</div>
      <div class="error-title">this file has expired</div>
      <p class="error-desc">
        files on shred are temporary. this one's gone for good — expired,
        hit its limit, or the link is wrong. nothing to recover, nothing to
        download.
      </p>
      <a href="/" class="btn">upload a file</a>
    </div>
    <a href="https://github.com/itsbt125/shred" class="nav-link">source code</a>
  </main>

</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shred — files</title>
<link rel="icon" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="wrap">

  <header class="site">
    <div class="brand">
        <a href="/" class="logo">shred</a>
      <span class="tagline">ephemeral file sharing &middot; <a href="https://github.com/itsbt125/shred">free &amp; open source</a></span>
    </div>
  </header>

  <main>
    <noscript>
      <div class="noscript-notice">
        <strong>javascript is required.</strong>
        <p>these files are decrypted entirely in your browser — the decryption key lives in the link's <code>#fragment</code> and is never sent to the server. without javascript there is no way to read them.</p>
        <p>if you're on tor browser, lower the security level below "safest" (which disables scripts). this is inherent to any end-to-end encrypted tool.</p>
      </div>
    </noscript>
    <div class="file-card">
      <div class="file-name" id="group-title">loading...</div>
      <div class="file-meta" id="group-meta"></div>

      <div class="password-gate" id="group-password-gate" hidden>
        <div class="field-label">passphrase</div>
        <div class="password-input-wrap">
          <input type="password" id="group-decrypt-password" placeholder="enter passphrase">
          <button type="button" id="group-password-toggle-btn" class="password-toggle-btn" aria-label="show passphrase">show</button>
        </div>
        <button class="btn btn-block" id="group-unlock-btn" disabled>unlock files</button>
        <div class="download-status" id="group-password-status"></div>
      </div>

      <div class="group-zip-actions" id="group-zip-actions" hidden>
        <button type="button" class="btn btn-block" id="group-zip-btn">download all as .zip</button>
        <div class="upload-progress" id="group-zip-progress"><div class="upload-progress-fill" id="group-zip-progress-fill"></div></div>
        <div class="download-status" id="group-zip-status"></div>
      </div>

      <div class="group-list" id="group-list"></div>

      <div class="download-status" id="group-status"></div>
    </div>

    <a href="/" class="link-secondary">&larr; upload your own files</a>
  </main>

  <footer class="site-footer">
    <nav class="footer-links">
      <a href="/">home</a>
      <span class="footer-sep">/</span>
      <a href="/terms">acceptable use</a>
      <span class="footer-sep">/</span>
      <a href="https://github.com/itsbt125/shred">source code (github)</a>
    </nav>
  </footer>

</div>

<script id="config-data" type="application/json">{{ config_json|safe }}</script>
<script src="/static/crypto.js"></script>
<script src="/static/zip.js"></script>
<script src="/static/script.js"></script>
</body>
</html>

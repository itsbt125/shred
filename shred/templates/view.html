<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shred — file</title>
<link rel="icon" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="wrap">

  <header class="site">
    <div class="brand">
        <a href="/" class="logo">shred</a>
      <span class="tagline">ephemeral file sharing &middot; <a href="https://github.com/itsbt125/shred">free &amp; open source</a></span>
    </div>
  </header>

  <main>
    <noscript>
      <div class="noscript-notice">
        <strong>javascript is required.</strong>
        <p>this file is decrypted entirely in your browser — the decryption key lives in the link's <code>#fragment</code> and is never sent to the server. without javascript there is no way to read it.</p>
        <p>if you're on tor browser, lower the security level below "safest" (which disables scripts). this is inherent to any end-to-end encrypted tool.</p>
      </div>
    </noscript>
    <div class="file-card">
      <div class="file-name" id="file-name">loading...</div>
      <div class="file-meta" id="file-meta"></div>
      <div class="trust-note" id="trust-note">decrypted in your browser — the server only ever stores ciphertext.</div>

      <div class="paste-view" id="paste-view" hidden>
        <textarea id="paste-content" class="paste-textarea" rows="10" readonly></textarea>
        <button class="copy-btn" id="paste-copy-btn" type="button">copy text</button>
      </div>

      <div class="password-gate" id="password-gate" hidden>
        <div class="field-label">passphrase</div>
        <div class="password-input-wrap">
          <input type="password" id="decrypt-password" placeholder="enter passphrase">
          <button type="button" id="password-toggle-btn" class="password-toggle-btn" aria-label="show passphrase">show</button>
        </div>
      </div>

      <button class="btn btn-block" id="download-btn" disabled>download</button>
      <div class="upload-progress" id="download-progress"><div class="upload-progress-fill" id="download-progress-fill"></div></div>
      <div class="download-status" id="download-status" aria-live="polite"></div>

      <div class="report-row">
        <button type="button" id="report-btn" class="link-report">report abuse</button>
        <span class="report-status" id="report-status" aria-live="polite"></span>
      </div>
    </div>

    <a href="/" class="link-secondary">&larr; upload your own file</a>
  </main>

  <footer class="site-footer">
    <nav class="footer-links">
      <a href="/">home</a>
      <span class="footer-sep">/</span>
      <a href="/terms">acceptable use</a>
      <span class="footer-sep">/</span>
      <a href="https://github.com/itsbt125/shred">source code (github)</a>
    </nav>
  </footer>

</div>

<script id="config-data" type="application/json">{{ config_json|safe }}</script>
<script src="/static/crypto.js"></script>
<script src="/static/script.js"></script>
</body>
</html>
